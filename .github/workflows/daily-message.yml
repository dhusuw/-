name: 每日消息推送

on:
  schedule:
    # UTC+8 北京时间每天早上 8:00 → UTC 0:00
    - cron: "0 0 * * *"
  workflow_dispatch:  # 允许手动触发测试

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 发送推送
        env:
          SCT_SENDKEY: ${{ secrets.SCT_SENDKEY }}
          MSG_TITLE: "HK416 · 早安"
          MSG_DESP: |
            ## 早安，指挥官。

            新的一天。别磨蹭。

            ---
            *HK416 · {{ date }}*
        run: python .github/scripts/send_daily_msg.py
