name: Daily Report Push

on:
  schedule:
    - cron: "38 22 * * *"  # 06:38 Beijing
    - cron: "7 4 * * *"    # 12:07 Beijing
    - cron: "7 10 * * *"   # 18:07 Beijing
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send daily report
        env:
          SCT_SENDKEY: ${{ secrets.SCT_SENDKEY }}
          MSG_CITY: "Guangzhou"
        run: python 每日问候/send_daily_msg.py
