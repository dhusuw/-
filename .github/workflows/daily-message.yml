name: 每日报告推送

on:
  schedule:
    - cron: "55 1 * * *"  # UTC 01:55 = 北京时间 09:55（测试）
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 发送每日报告
        env:
          SCT_SENDKEY: ${{ secrets.SCT_SENDKEY }}
          MSG_CITY: "Guangzhou"
        run: python 每日问候/send_daily_msg.py
