name: 每日报告推送

on:
  schedule:
    - cron: "7 0 * * *"  # UTC 00:07 = 北京时间 08:07
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 发送每日报告
        env:
          SCT_SENDKEY: ${{ secrets.SCT_SENDKEY }}
          MSG_CITY: "Guangzhou"
        run: python 每日问候/send_daily_msg.py
